name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Remove deprecated always-auth from .npmrc
        run: sed -i '/always-auth/d' ~/.npmrc

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Set version from release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          pnpm -r exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "bump version to $VERSION"
          git push origin HEAD:main

      - name: Publish to npm
        run: |
          pnpm --filter @typecek/runtime publish --access public --no-git-checks
          pnpm --filter @typecek/core publish --access public --no-git-checks
          pnpm --filter @typecek/compiler publish --access public --no-git-checks
          pnpm --filter @typecek/cli publish --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
